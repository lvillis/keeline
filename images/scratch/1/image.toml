schema = 1
family = "scratch"
line = "1"
version = "1"
id = "scratch-1"
package = "keeline-scratch"
publish = true
status = "stable"
platforms = ["linux/amd64", "linux/arm64"]

[tools.tino]
role = "init"
release = "0.1.33"
image = "ghcr.io/lvillis/tino:0.1.33@sha256:2514ba79a1881d8a92337f0ee0f60fabff081fb757543e836af922dbcc7f93b0"
source_path = "/sbin/tino"
target_path = "/sbin/tino"
entrypoint = ["/sbin/tino", "-g", "-s", "--"]

[tools.salus]
role = "healthcheck"
release = "0.1.10"
image = "ghcr.io/lvillis/salus:0.1.10@sha256:f0a8ed7bfc6a62dfafc3aa25d61c01d7c7eb88b5c20e4f64c76f2d0a0b641045"

schema = 1
family = "scratch"
line = "1"
version = "1"
id = "scratch-1"
package = "keeline-scratch"
publish = true
status = "stable"
platforms = ["linux/amd64", "linux/arm64"]

[tools.tino]
role = "init"
release = "0.1.27"
image = "ghcr.io/lvillis/tino:0.1.27@sha256:43e4234cec7c7b19139036ee5ac3ad209838312048214cab3ed3d8acb0eea4b4"

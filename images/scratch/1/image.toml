schema = 1
family = "scratch"
line = "1"
version = "1"
id = "scratch-1"
package = "keeline-scratch"
publish = true
status = "stable"
platforms = ["linux/amd64", "linux/arm64"]

[init]
provider = "tino"
release = "0.1.26"
image = "ghcr.io/lvillis/tino:0.1.26@sha256:8ad7b87083aee56d97f68c355bf57ad0a55ad5b00508f87dd86e148dcf91374b"
binary_path = "/sbin/tino"
entrypoint = ["/sbin/tino", "-g", "-s", "--"]

[healthcheck]
provider = "salus"
release = "0.1.8"
image = "ghcr.io/lvillis/salus:0.1.8@sha256:c8469182df00b34dec2467776c86c22b36b235f3c4f6c93c3fff441f1b3ee568"
binary_path = "/bin/salus"

[[variants]]
name = "default"
dockerfile = "Dockerfile"
base_image = "scratch"
builder_image = "docker.io/library/debian:13-slim"
title = "Keeline Scratch 1"
description = "Keeline scratch base image with tino and salus"
command = ["/bin/salus", "--version"]
canonical = ["1"]

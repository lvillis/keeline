schema = 1
family = "debian"
line = "13"
version = "13"
distro = "trixie"
id = "debian-13"
package = "keeline-debian"
publish = true
status = "stable"
platforms = ["linux/amd64", "linux/arm64"]

[init]
provider = "tino"
release = "0.1.26"
image = "ghcr.io/lvillis/tino:0.1.26@sha256:8ad7b87083aee56d97f68c355bf57ad0a55ad5b00508f87dd86e148dcf91374b"
binary_path = "/sbin/tino"
entrypoint = ["/sbin/tino", "-g", "-s", "--"]

[healthcheck]
provider = "salus"
release = "0.1.8"
image = "ghcr.io/lvillis/salus:0.1.8@sha256:c8469182df00b34dec2467776c86c22b36b235f3c4f6c93c3fff441f1b3ee568"
binary_path = "/bin/salus"

[[variants]]
name = "default"
dockerfile = "Dockerfile"
base_image = "docker.io/library/debian:13"
title = "Keeline Debian 13"
description = "Keeline Debian 13 (trixie) base image"
command = ["bash"]
canonical = ["13"]
alias = ["trixie"]

[[variants]]
name = "slim"
dockerfile = "slim.Dockerfile"
base_image = "docker.io/library/debian:13-slim"
title = "Keeline Debian 13 Slim"
description = "Keeline Debian 13 (trixie) slim base image"
command = ["bash"]
canonical = ["13-slim"]
alias = ["trixie-slim"]

name: Release Images

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      image_id:
        description: Optional image target id to release, for example `jdk-21-trixie`
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    if: github.repository == 'lvillis/keeline'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Generate release matrix
        id: matrix
        env:
          INPUT_IMAGE_ID: ${{ inputs.image_id }}
        run: |
          set -euo pipefail
          matrix_json="$(cargo run --quiet -- matrix)"

          if [ -n "${INPUT_IMAGE_ID:-}" ]; then
            matrix_json="$(jq --arg image_id "$INPUT_IMAGE_ID" '{include: [.include[] | select(.id == $image_id)]}' <<<"$matrix_json")"
          fi

          count="$(jq '.include | length' <<<"$matrix_json")"
          if [ "$count" -eq 0 ]; then
            echo "No images selected for release." >&2
            exit 1
          fi

          printf 'matrix=%s\n' "$(jq -c <<<"$matrix_json")" >>"$GITHUB_OUTPUT"

  publish:
    needs: prepare
    if: github.repository == 'lvillis/keeline'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish ${{ matrix.id }}
        env:
          KEELINE_IMAGE_SOURCE: ${{ github.server_url }}/${{ github.repository }}
          KEELINE_IMAGE_REVISION: ${{ github.sha }}
        run: cargo run --quiet -- release "${{ matrix.id }}" --owner "${{ github.repository_owner }}"

name: Release Images

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      image_id:
        description: Optional image target id to release, for example `java-21-trixie`
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    if: github.repository == 'lvillis/keeline'
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.matrix.outputs.build_matrix }}
      merge_matrix: ${{ steps.matrix.outputs.merge_matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustc --version
          cargo --version

      - name: Cache Rust artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ runner.arch }}-

      - name: Generate release matrix
        id: matrix
        env:
          INPUT_IMAGE_ID: ${{ inputs.image_id }}
        run: |
          set -euo pipefail
          merge_matrix_json="$(cargo run --quiet -- matrix)"
          build_matrix_json="$(cargo run --quiet -- matrix --per-platform)"

          if [ -n "${INPUT_IMAGE_ID:-}" ]; then
            merge_matrix_json="$(jq --arg image_id "$INPUT_IMAGE_ID" '{include: [.include[] | select(.id == $image_id)]}' <<<"$merge_matrix_json")"
            build_matrix_json="$(jq --arg image_id "$INPUT_IMAGE_ID" '{include: [.include[] | select(.id == $image_id)]}' <<<"$build_matrix_json")"
          fi

          count="$(jq '.include | length' <<<"$merge_matrix_json")"
          if [ "$count" -eq 0 ]; then
            echo "No images selected for release." >&2
            exit 1
          fi

          printf 'build_matrix=%s\n' "$(jq -c <<<"$build_matrix_json")" >>"$GITHUB_OUTPUT"
          printf 'merge_matrix=%s\n' "$(jq -c <<<"$merge_matrix_json")" >>"$GITHUB_OUTPUT"

  publish:
    needs: prepare
    if: github.repository == 'lvillis/keeline'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.build_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustc --version
          cargo --version

      - name: Cache Rust artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ runner.arch }}-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish ${{ matrix.id }} for ${{ matrix.platform }}
        env:
          KEELINE_IMAGE_SOURCE: ${{ github.server_url }}/${{ github.repository }}
          KEELINE_IMAGE_REVISION: ${{ github.sha }}
        run: cargo run -- release "${{ matrix.id }}" --owner "${{ github.repository_owner }}" --platform "${{ matrix.platform }}"

      - name: Upload build metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-metadata-${{ matrix.id }}-${{ matrix.arch }}
          path: target/keeline-release-metadata/${{ matrix.id }}-${{ matrix.arch }}.json
          if-no-files-found: error
          retention-days: 30

  manifest:
    needs:
      - prepare
      - publish
    if: github.repository == 'lvillis/keeline'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.merge_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustc --version
          cargo --version

      - name: Cache Rust artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ runner.arch }}-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish manifest for ${{ matrix.id }}
        run: cargo run -- manifest "${{ matrix.id }}" --owner "${{ github.repository_owner }}"
